<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currently Unavailable | EasySlip</title>
    <style>
        :root {
            --brand-green: #006D3B;
            --brand-green-light: #00A550;
            --brand-gold: #f4c95d;
            --ink: #112018;
            --surface: #f7fbf8;
            --whatsapp: #25D366;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Segoe UI", "Trebuchet MS", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 15%, rgba(244, 201, 93, 0.22), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(0, 165, 80, 0.2), transparent 35%),
                linear-gradient(160deg, #eaf8ee 0%, #f7fbf8 45%, #eef9f2 100%);
            display: grid;
            place-items: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .card {
            width: min(720px, 100%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 109, 59, 0.18);
            border-radius: 28px;
            padding: 32px 28px;
            box-shadow: 0 16px 40px rgba(0, 60, 32, 0.16);
            position: relative;
            animation: riseIn 700ms ease both;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(120deg, var(--brand-green), var(--brand-green-light));
            color: var(--white);
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 0.72rem;
            padding: 8px 12px;
            border-radius: 999px;
            margin-bottom: 18px;
        }

        h1 {
            font-size: clamp(1.9rem, 4.6vw, 3.05rem);
            line-height: 1.08;
            margin-bottom: 12px;
            color: #0b3f24;
        }

        .accent {
            color: var(--brand-green);
            text-decoration: underline;
            text-decoration-thickness: 3px;
            text-decoration-color: rgba(244, 201, 93, 0.95);
            text-underline-offset: 4px;
        }

        p {
            font-size: clamp(1rem, 2.4vw, 1.12rem);
            line-height: 1.65;
            max-width: 58ch;
            color: rgba(17, 32, 24, 0.88);
            margin-bottom: 24px;
        }

        .cta-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: #083a1f;
            font-weight: 800;
            font-size: 1rem;
            background: linear-gradient(120deg, #7ef3ae, var(--whatsapp));
            box-shadow: 0 10px 22px rgba(37, 211, 102, 0.28);
            transition: transform 180ms ease, box-shadow 180ms ease;
        }

        .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 26px rgba(37, 211, 102, 0.35);
        }

        .whatsapp-btn:active {
            transform: translateY(0);
        }

        .number {
            display: inline-flex;
            font-weight: 700;
            color: #174f30;
            background: rgba(0, 109, 59, 0.08);
            border: 1px solid rgba(0, 109, 59, 0.16);
            border-radius: 12px;
            padding: 12px 14px;
        }

        .footer-note {
            margin-top: 22px;
            font-size: 0.9rem;
            color: rgba(17, 32, 24, 0.7);
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 560px) {
            .card {
                padding: 24px 20px;
                border-radius: 22px;
            }

            .whatsapp-btn,
            .number {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <main class="card" role="main" aria-labelledby="title">
        <span class="badge">EasySlip Notice</span>
        <h1 id="title">Service is <span class="accent">currently unavailable</span>.</h1>
        <p>
            We are temporarily unable to process requests right now. For quick support and updates, please contact us directly on WhatsApp.
        </p>

        <div class="cta-wrap">
            <a
                class="whatsapp-btn"
                href="https://wa.me/447435111412?text=Hi%20EasySlip%2C%20I%20need%20help%20with%20the%20service."
                target="_blank"
                rel="noopener noreferrer"
                aria-label="Contact EasySlip on WhatsApp"
            >
                Contact on WhatsApp
            </a>
        </div>

        <p class="footer-note">Thank you for your patience.</p>
    </main>

    <script type="text/javascript">
        var Tawk_API = Tawk_API || {}, Tawk_LoadStart = new Date();
        Tawk_API.onLoad = function () {
            Tawk_API.minimize();
        };
        (function () {
            var s1 = document.createElement("script"), s0 = document.getElementsByTagName("script")[0];
            s1.async = true;
            s1.src = "https://embed.tawk.to/6915d6142af5c119557c9226/1j9ukognh";
            s1.charset = "UTF-8";
            s1.setAttribute("crossorigin", "*");
            s0.parentNode.insertBefore(s1, s0);
        })();
    </script>
</body>
</html>
